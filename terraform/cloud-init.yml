#cloud-config

package_update: true
package_upgrade: true

packages:
  - git
  - curl
  - ufw
  - nginx

users:
  - name: deployer
    groups: sudo, docker
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: true

runcmd:
  # Directory needs to exist before authorized_keys are created
  - mkdir -p /home/deployer/.ssh

  # Install and configure Docker
  - apt-get update
  - apt-get install -y docker.io
  - systemctl daemon-reload
  - systemctl start docker
  - systemctl enable docker

  # Install Docker Compose
  - apt-get install -y docker-compose-v2
  - ln -s /usr/libexec/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose

  # Configure UFW
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Create swap if needed
  - |
    if [ ! -f /swapfile ]; then
      fallocate -l 1G /swapfile
      chmod 600 /swapfile
      mkswap /swapfile
      swapon /swapfile
      echo '/swapfile none swap sw 0 0' >> /etc/fstab
    fi

  # Optimize swap
  - echo 'vm.swappiness=10' >> /etc/sysctl.conf
  - sysctl -p

  # Harden SSH
  - sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart sshd

  # Clone app repo
  - mkdir -p /home/deployer/instance-starter
  - git clone -b ${app_branch} ${app_repo_url} /home/deployer/instance-starter
  - chown -R deployer:deployer /home/deployer/instance-starter
  - chown -R deployer:deployer /home/deployer/.ssh

  # Move .env into place
  - mv /tmp/app.env /home/deployer/instance-starter/.env
  - chown deployer:deployer /home/deployer/instance-starter/.env

  # Authenticate with GHCR
  - su - deployer -c "echo ${ghcr_pat} | docker login ghcr.io -u ${github_username} --password-stdin"

  # Start app
  - cd /home/deployer/instance-starter && docker-compose -f docker-compose.yaml pull
  - cd /home/deployer/instance-starter && docker-compose -f docker-compose.yaml up -d

  # Wait for database to be ready
  - |
    cd /home/deployer/instance-starter
    MAX_RETRIES=30
    COUNT=0
    until docker-compose -f docker-compose.yaml exec -T db pg_isready -U ${db_user} -d ${db_name}; do
      COUNT=$((COUNT + 1))
      if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
        echo "ERROR: Database did not become ready in time."
        exit 1
      fi
      sleep 2
    done

  # Django setup
  - cd /home/deployer/instance-starter && docker-compose -f docker-compose.yaml exec -T web python manage.py migrate --noinput
  - cd /home/deployer/instance-starter && docker-compose -f docker-compose.yaml exec -T web python manage.py collectstatic --noinput
  - cd /home/deployer/instance-starter && docker-compose -f docker-compose.yaml exec -T web python manage.py ensure_superuser
  - cd /home/deployer/instance-starter && docker-compose -f docker-compose.yaml exec -T web python manage.py sync_instances

  # Fix static files permissions for Nginx
  - chmod 755 /home/deployer
  - chmod -R 755 /home/deployer/instance-starter/staticfiles

  # Configure Nginx
  - mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
  - ln -sf /etc/nginx/sites-available/instance-starter /etc/nginx/sites-enabled/instance-starter
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t
  - systemctl enable nginx
  - systemctl restart nginx

  # Obtain SSL certificate
  - apt-get install -y certbot python3-certbot-nginx
  - certbot --nginx -d ${domain} --non-interactive --agree-tos -m ${certbot_email} --redirect

  # Install GitHub Actions runner
  - mkdir -p /home/deployer/actions-runner
  - curl -o /home/deployer/actions-runner/actions-runner-linux-x64-2.323.0.tar.gz -L https://github.com/actions/runner/releases/download/v2.323.0/actions-runner-linux-x64-2.323.0.tar.gz
  - tar xzf /home/deployer/actions-runner/actions-runner-linux-x64-2.323.0.tar.gz -C /home/deployer/actions-runner
  - chown -R deployer:deployer /home/deployer/actions-runner

  # Register runner
  - |
    REG_TOKEN=$(curl -s -X POST \
      -H "Authorization: token ${github_runner_pat}" \
      -H "Accept: application/vnd.github.v3+json" \
      https://api.github.com/repos/leighwest/instance-starter/actions/runners/registration-token \
      | python3 -c "import sys, json; print(json.load(sys.stdin)['token'])")
    su - deployer -c "cd /home/deployer/actions-runner && ./config.sh --url https://github.com/leighwest/instance-starter --token $REG_TOKEN --unattended --name instance-starter-runner --labels self-hosted --replace"

  # Install and start runner as systemd service
  - |
    cd /home/deployer/actions-runner
    ./svc.sh install deployer
    ./svc.sh start

write_files:
  - path: /etc/instance-starter-provisioned
    content: |
      Provisioned on $(date)
    permissions: '0644'
  - path: /tmp/app.env
    permissions: '0600'
    content: |
      AWS_ACCESS_KEY_ID=${aws_access_key_id}
      AWS_SECRET_ACCESS_KEY=${aws_secret_access_key}
      AWS_REGION=${aws_region}
      CSRF_TRUSTED_ORIGINS=https://${domain}
      DATABASE_NAME=${db_name}
      DATABASE_USER=${db_user}
      DATABASE_PASSWORD=${db_password}
      DATABASE_HOST=db
      DATABASE_PORT=5432
      DJANGO_SECRET_KEY=${django_secret_key}
      DEBUG=False
      ALLOWED_HOSTS=${django_allowed_hosts}
      REDIS_URL=redis://redis:6379
      CELERY_BROKER_URL=redis://redis:6379/0
      CELERY_RESULT_BACKEND=redis://redis:6379/0
      DJANGO_SUPERUSER_USERNAME=${django_superuser_username}
      DJANGO_SUPERUSER_EMAIL=${django_superuser_email}
      DJANGO_SUPERUSER_PASSWORD=${django_superuser_password}
  - path: /home/deployer/.ssh/authorized_keys
    permissions: '0600'
    content: |
      ${deployer_ssh_public_key}
  - path: /etc/nginx/sites-available/instance-starter
    owner: root:root
    permissions: '0644'
    content: |
      ${nginx_config}
